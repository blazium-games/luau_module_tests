name: Luau Module Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      blazium_ref:
        description: "Blazium engine git ref (branch, tag, or SHA)"
        required: false
        default: "blazium-dev"
        type: string

concurrency:
  group: luau-module-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autowork:
    name: Build editor and run Autowork
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout test project
        uses: actions/checkout@v4

      - name: Checkout Blazium engine
        uses: actions/checkout@v4
        with:
          repository: blazium-games/blazium
          ref: ${{ github.event.inputs.blazium_ref || 'blazium-dev' }}
          path: blazium
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SCons
        run: python -m pip install scons

      - name: Build editor with Luau + Autowork
        working-directory: blazium
        run: python -m SCons platform=windows target=editor module_autowork_enabled=yes -j2

      - name: Export editor paths
        shell: pwsh
        run: |
          $exe = Resolve-Path "blazium/bin/blazium.windows.editor.x86_64.console.exe"
          Write-Host "Using editor: $exe"
          "BLAZIUM_EXE=$exe" >> $env:GITHUB_ENV
          "TEST_PROJECT=$($env:GITHUB_WORKSPACE)" >> $env:GITHUB_ENV

      - name: Smoke check editor
        shell: pwsh
        run: |
          & $env:BLAZIUM_EXE --version
          if ($LASTEXITCODE -ne 0) {
            throw "Editor --version failed with exit code $LASTEXITCODE"
          }

      - name: Run validation gate
        shell: pwsh
        env:
          CI: true
          AW_JUNIT: results/junit.xml
        run: |
          New-Item -ItemType Directory -Force -Path results | Out-Null
          pwsh -File tools/validate_all.ps1

      - name: Upload JUnit on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: results/junit.xml
