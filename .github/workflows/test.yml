name: Luau Module Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      engine_version:
        description: "Blazium engine version (empty = latest nightly)"
        required: false
        default: ""
        type: string

concurrency:
  group: luau-module-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autowork:
    name: Download editor and run Autowork
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout test project
        uses: actions/checkout@v4

      - name: Setup Blazium CLI
        uses: blazium-games/setup-blazium-cli@master
        with:
          version: 0.0.14

      - name: Verify Blazium CLI
        shell: bash
        run: blazium-cli --version

      - name: Download and extract Blazium editor
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $downloads = Join-Path $env:GITHUB_WORKSPACE "downloads"
          New-Item -ItemType Directory -Force -Path $downloads | Out-Null

          $versionArg = "${{ github.event.inputs.engine_version }}"
          if ($versionArg) {
            blazium-cli --download --editor --platform windows --arch x86_64 --get-version $versionArg --channel nightly $downloads
          } else {
            blazium-cli --download --editor --platform windows --arch x86_64 --latest-nightly --channel nightly $downloads
          }

          $zip = Get-ChildItem $downloads -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            Write-Error "No editor zip found in $downloads"
          }

          $editorRoot = Join-Path $env:GITHUB_WORKSPACE "blazium_editor"
          Expand-Archive -Path $zip.FullName -DestinationPath $editorRoot -Force

          $exe = Get-ChildItem $editorRoot -Recurse -Filter "blazium.windows.editor.x86_64.console.exe" | Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem $editorRoot -Recurse -Filter "blazium.windows.editor.x86_64.exe" | Select-Object -First 1
          }
          if (-not $exe) {
            Write-Error "No Blazium editor binary found under $editorRoot"
          }

          Write-Host "Using editor: $($exe.FullName)"
          "BLAZIUM_EXE=$($exe.FullName)" >> $env:GITHUB_ENV
          "TEST_PROJECT=$($env:GITHUB_WORKSPACE)" >> $env:GITHUB_ENV

      - name: Smoke check editor
        shell: pwsh
        run: |
          & $env:BLAZIUM_EXE --version
          & $env:BLAZIUM_EXE --headless --path $env:TEST_PROJECT --check-only

      - name: Run validation gate
        shell: pwsh
        env:
          CI: true
          AW_JUNIT: results/junit.xml
        run: |
          New-Item -ItemType Directory -Force -Path results | Out-Null
          pwsh -File tools/validate_all.ps1

      - name: Upload JUnit on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: results/junit.xml
